name: Publish demo preview to GitHub Pages

# Construye la app React con VITE_DEMO_MODE=true (Firebase reemplazado
# por mocks en memoria + localStorage) y la publica en GitHub Pages.
#
# Para que funcione la primera vez:
#   1. Settings > Pages del repo, en "Source" elige "GitHub Actions".
#   2. Mergea el PR (o haz push a main).
#   3. La URL queda en:
#      https://<owner>.github.io/<repo>/

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "demo/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig.json"
      - ".github/workflows/preview.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build demo bundle
        env:
          VITE_DEMO_MODE: "true"
          BASE_URL: "/${{ github.event.repository.name }}/"
        run: npm run build

      - name: Add quick-glance preview alongside the SPA
        run: |
          # Mantenemos el HTML standalone como /preview.html para los que
          # solo quieran un vistazo rápido sin descargarse el bundle.
          cp demo/preview.html dist/preview.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
